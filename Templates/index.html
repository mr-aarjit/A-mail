<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mail Generator by Aarjit Boss</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Nosifer&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&display=swap" rel="stylesheet">
  

    <style>
      body {
        background-color: #000000;
        display: flex;
        justify-content: center;
        cursor: url('curosr- /static/cursor.cur'), url('/static/cursor.png'), grab;
      }

      button.fade {
        opacity: 0;
      }

      footer {
        color: whitesmoke;
      }

      header {
        color: rgb(255, 255, 255);
        font-family: 'Nosifer', cursive, sans-serif;
        margin-top: -20px;
        display: flex;
        flex-direction: column;
        align-items: center; /* centers paragraph & button */
      }

      header h1 {
        font-size: 80px;
        margin-left: auto; /* kept as you had */
        animation: floatupdown 5s ease-in-out infinite;
      }

      header button {
        font-family: "New Rocker";
        margin-top: 200px;
        border: 2px solid lightblue;
        border-image: linear-gradient(to right, lightblue, blue, white);
        background: white;
        padding: 10px;
        margin-left: -80px;
        border-radius : 20px 20px;
        font-size: 30px;
        
      }

      @keyframes floatupdown {
        0% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-12px);
        }

        100% {
          transform: translateY(0);
        }
      }
    </style>

   
    
  </head>

  <body>
    <header>
      <h1>A-mail Generator</h1>

      <form method="POST" action="{% url 'main' %}">
        {% csrf_token %}
        <button type="submit" id="btn" name="btn">Start</button>
      </form>
    </header>
    <script src="{% static "js/index.js" %}">

    </script>
  </body>
</html>
